(function() {
  var input  = document.getElementById('search-input');
  var resEl  = document.getElementById('search-results');
  var sumEl  = document.getElementById('search-summary');

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function hi(text, terms) {
    var out = esc(text);
    terms.forEach(function(t) {
      if (!t) return;
      out = out.replace(new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>');
    });
    return out;
  }

  function run(raw) {
    var q = raw.trim();
    if (!q) {
      resEl.innerHTML = '<div class="search-hint">🔍 輸入任何關鍵字即可搜尋全站內容</div>';
      sumEl.textContent = '';
      return;
    }
    var terms = q.split(/\s+/).filter(Boolean).map(function(t){ return t.toLowerCase(); });
    var scored = [];
    PAGES.forEach(function(p) {
      var hay = (p.title + p.cat + p.desc + p.kw).toLowerCase();
      var matched = terms.filter(function(t){ return hay.indexOf(t) !== -1; });
      if (matched.length === 0) return;
      var s = 0;
      matched.forEach(function(t) {
        if (p.title.toLowerCase().indexOf(t) !== -1) s += 100;
        if (p.cat.toLowerCase().indexOf(t)   !== -1) s += 40;
        if (p.desc.toLowerCase().indexOf(t)  !== -1) s += 30;
        if (p.kw.toLowerCase().indexOf(t)    !== -1) s += 10;
      });
      s += matched.length * 5;
      scored.push({ p: p, s: s, matched: matched });
    });
    scored.sort(function(a,b){ return b.s - a.s; });
    if (scored.length === 0) {
      sumEl.textContent = '找不到「' + q + '」相關頁面';
      resEl.innerHTML = '<div class="search-empty"><div class="ei">🔍</div>找不到符合的頁面，換個關鍵字試試</div>';
      return;
    }
    sumEl.textContent = '找到 ' + scored.length + ' 個相關頁面';
    var html = '';
    scored.forEach(function(item) {
      var p = item.p;
      html += '<a class="result-card" href="' + p.url + '">'
        + '<div class="result-icon">' + p.icon + '</div>'
        + '<div class="result-body">'
        +   '<div class="result-title">' + hi(p.title, item.matched) + '</div>'
        +   '<div class="result-url">📎 ' + p.url + '</div>'
        +   '<span class="result-category">' + esc(p.cat) + '</span>'
        +   '<div class="result-snippet">' + hi(p.desc, item.matched) + '</div>'
        + '</div>'
        + '<div class="result-arrow">→</div>'
        + '</a>';
    });
    resEl.innerHTML = html;
  }

  var timer;
  input.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(function(){ run(input.value); }, 120);
  });
  document.getElementById('search-form').addEventListener('submit', function(e) {
    e.preventDefault();
    run(input.value);
  });
  document.querySelectorAll('.chip').forEach(function(c) {
    c.addEventListener('click', function() {
      input.value = c.dataset.q;
      run(c.dataset.q);
      input.focus();
    });
  });
  var qp = new URLSearchParams(location.search).get('q');
  if (qp) { input.value = qp; run(qp); }
})();
</script>
<script src="main.js"></script>
</body>
</html>
